<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://kit.fontawesome.com/d6cbf412fd.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="img/dant.png" type="image/x-icon" />
  <title>Death & Taxes Tracker</title>
</head>

<body>

  <div id="update-banner"
    style="background-color: #ff4757; color: white; text-align: center; padding: 10px; font-weight: bold; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: center; align-items: center; gap: 15px;">
    <span>⚠️ UPDATE ALERT: System maintenance and update scheduled for 00:00 UTC 0 on 20/2. ⚠️</span>
    <button onclick="dismissBanner()"
      style="background: none; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.2rem;">X</button>
  </div>
  <header>
    <section class="mainHeader">
      <div id="actual" class="actual"></div>
      <div class="searchContainer">
        <p class="search">Search:</p>
        <div class="serachBlock">
          <input type="text" id="getData" />
          <a href="#" onclick="buscar()"><i class="fa-solid fa-magnifying-glass"></i></a>
        </div>
      </div>
    </section>
    <section class="current">
      <div class="actualLemon" id="actualLemon"></div>
      <div class="status" id="status"></div>
    </section>
  </header>
  <main>
    <section class="cardContainer" id="cardContainer"></section>
  </main>
  <script src="script.js"></script>
</body>

</html>
